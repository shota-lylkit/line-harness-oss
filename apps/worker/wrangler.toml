name = "line-crm-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# API_KEY is set via `wrangler secret put API_KEY`
# Do NOT hardcode secrets here

[vars]
WORKER_URL = "https://line-crm-worker.spothoiku-test.workers.dev"

[[d1_databases]]
binding = "DB"
database_name = "line-crm-test"
database_id = "94726520-4bf1-4353-bd01-8ec33de3d830"

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "spothoiku-documents"

[triggers]
crons = ["*/5 * * * *"]
