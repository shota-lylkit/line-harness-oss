<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 2500px; height: 843px; overflow: hidden; }
  .menu {
    display: flex;
    width: 2500px;
    height: 843px;
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  }
  .btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    border-right: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
  }
  .btn:last-child { border-right: none; }
  .btn-jobs {
    background: linear-gradient(135deg, #f06292, #ec407a);
  }
  .btn-profile {
    background: linear-gradient(135deg, #ff8a80, #f06292);
  }
  .btn-contact {
    background: linear-gradient(135deg, #ffab91, #ff8a80);
  }
  .icon {
    width: 160px;
    height: 160px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon svg {
    width: 90px;
    height: 90px;
    fill: white;
  }
  .label {
    color: white;
    font-size: 52px;
    font-weight: 700;
    letter-spacing: 3px;
  }
  .sub {
    color: rgba(255,255,255,0.8);
    font-size: 30px;
    font-weight: 400;
  }
</style>
</head>
<body>
<div class="menu">
  <!-- お仕事を探す -->
  <div class="btn btn-jobs">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </div>
    <span class="label">お仕事を探す</span>
    <span class="sub">Find Jobs</span>
  </div>
  <!-- 登録情報 -->
  <div class="btn btn-profile">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>
    <span class="label">登録情報</span>
    <span class="sub">My Profile</span>
  </div>
  <!-- お問い合わせ -->
  <div class="btn btn-contact">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
    </div>
    <span class="label">お問い合わせ</span>
    <span class="sub">Contact</span>
  </div>
</div>
</body>
</html>
